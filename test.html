<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figma2Vibe — Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-200 flex items-center justify-center p-10">

  <!-- Section: CSS Grid 2×2, 1fr 3fr / 1fr 3fr, gap 10px -->
  <section class="grid grid-cols-[1fr_3fr] grid-rows-[1fr_3fr] gap-2.5 w-auto h-auto bg-white overflow-hidden"
           style="width: 1010px; height: 610px;">

    <!-- Rectangle 36926: grid-area 1/1, 240×140, fill #d9d9d9, radius 0 0 1000 0 -->
    <div class="bg-zinc-300 rounded-tl-none rounded-tr-none rounded-br-[1000px] rounded-bl-none"
         style="grid-area: 1 / 1; width: 240px; height: 140px;">
    </div>

    <!-- Card: grid-area 2/2, flex-col, items-center, justify-end, 760×460, fill #f0f2f3, radius 24 -->
    <div class="flex flex-col items-center justify-end bg-gray-100 rounded-3xl relative"
         style="grid-area: 2 / 2; width: 760px; height: 460px;">

      <!-- image 32: 410×553, fill #ff0000, shrink-0 чтобы не сжимался и вылезал вверх -->
      <div class="bg-[#ff0000] shrink-0" style="width: 410px; height: 553px;"></div>

      <!-- Круг: absolute, top -40, left -40, 40×40, fill #d9d9d9, rounded-full -->
      <div class="absolute bg-zinc-300 rounded-full"
           style="top: -40px; left: -40px; width: 40px; height: 40px;">
      </div>

      <!-- Текст: absolute, centered vertically + horizontally -->
      <p class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-lg font-normal text-left text-black whitespace-nowrap"
         style="font-family: 'Jost', sans-serif; width: 291px; height: 26px;">
        Вайбкодин сила в правильных руках
      </p>
    </div>

  </section>

</body>
</html>
